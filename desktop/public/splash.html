<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Argon Agent</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 20%, #1d2638 0%, #141416 42%, #0f1012 100%);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei",
          sans-serif;
      }
      .wrap {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(32, 34, 40, 0.55);
        backdrop-filter: blur(18px);
        border-radius: 18px;
        min-width: 300px;
        padding: 22px 24px;
        color: #f3f4f6;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      }
      .title {
        margin: 0;
        font-size: 21px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .sub {
        margin-top: 6px;
        font-size: 13px;
        color: #9ca3af;
      }
      .loader {
        margin-top: 16px;
        width: 28px;
        height: 28px;
        border: 2px solid rgba(94, 161, 255, 0.24);
        border-top-color: #5ea1ff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">Argon Agent</h1>
        <div class="sub">正在启动本地运行时与工作台...</div>
        <div class="loader"></div>
      </div>
    </div>
  </body>
</html>
